:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --iris: #4af7c4;
  --iris-dim: #1a6652;
  --pupil: #050508;
  --sclera: #e8eaf0;
  --glow: rgba(74, 247, 196, 0.3);
  --text: #8888aa;
  --text-bright: #ccccee;
  --accent: #ff6b6b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text-bright);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}

header {
  grid-column: 1 / -1;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 16px;
}

header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--iris);
}

header span {
  font-size: 11px;
  color: var(--text);
  letter-spacing: 0.1em;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--iris);
  display: inline-block;
  margin-right: 8px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* CANVAS STAGE */
.stage {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

.stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(74,247,196,0.04) 0%, transparent 70%);
  pointer-events: none;
}

canvas {
  cursor: crosshair;
}

/* CONTROL PANEL */
.panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.panel-section h2 {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.control-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.control-row label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text);
  display: flex;
  justify-content: space-between;
}

.control-row label span {
  color: var(--iris);
  font-weight: 700;
}

input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  height: 2px;
  background: var(--border);
  outline: none;
  border-radius: 2px;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--iris);
  cursor: pointer;
  box-shadow: 0 0 8px var(--glow);
}

.behavior-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}

button:hover {
  border-color: var(--iris);
  color: var(--iris);
  box-shadow: 0 0 12px var(--glow);
}

button.active {
  background: var(--iris);
  color: var(--bg);
  border-color: var(--iris);
  font-weight: 700;
}

.log {
  font-size: 10px;
  color: var(--text);
  line-height: 1.8;
  max-height: 120px;
  overflow-y: auto;
}

.log div { 
  padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.log div span {
  color: var(--iris);
  margin-right: 6px;
}

/* Accordions */
.accordion { margin-bottom: 4px; }
.acc-header {
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0 0 8px 0;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: none;
}
.acc-header:hover { color: var(--text-bright); border-color: var(--iris); box-shadow: none; }
.chevron { transition: transform 0.2s ease; display: inline-block; }
.accordion.open .chevron { transform: rotate(180deg); }
.acc-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
.accordion.open .acc-body { max-height: 2000px; }
.acc-inner { padding-top: 16px; padding-bottom: 8px; }

/* Color rows */
.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.color-row label { flex: 1; font-size: 10px; letter-spacing: 0.1em; color: var(--text); }
.color-row input[type="color"] {
  width: 40px;
  height: 24px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: none;
  cursor: pointer;
  padding: 1px;
}
.color-row .hex { color: var(--iris); font-size: 10px; width: 60px; }

/* Export / Import */
.export-wrap, .load-wrap { display: none; margin-top: 12px; }
.export-wrap.visible, .load-wrap.visible { display: block; }
textarea.json-area {
  width: 100%;
  height: 90px;
  background: #08080e;
  border: 1px solid var(--border);
  color: var(--iris);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 8px;
  resize: vertical;
  border-radius: 2px;
  box-sizing: border-box;
}
.error-msg { color: var(--accent); font-size: 9px; margin-top: 4px; }
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn-row button { flex: 1; font-size: 9px; padding: 8px; }

<script>
// ─────────────────────────────────────────────
//  GAZER — Robot Eye Behavior System
//  v0.1 — browser proof of concept
// ─────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Parameters (all tweakable) ──
const params = {
  arcCurvature:  0.40,
  gazeSpeed:     0.60,
  saccadeJitter: 0.20,
  lidOpenness:   0.85,
  pupilSize:     0.38,
  blinkInterval: 3.0,
};

// ── Color params ──
const colors = {
  irisHighlight: '#5fffd8',
  irisMid:       '#2abf8e',
  irisDeep:      '#0d4a36',
  glowColor:     '#4af7c4',
  scleraLight:   '#f0f2f8',
  scleraDark:    '#c8cad8',
  pupilColor:    '#111111',
};

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Eye geometry (left, right) ──
const EYES = [
  { cx: 175, cy: 250, rx: 100, ry: 70 },
  { cx: 425, cy: 250, rx: 100, ry: 70 },
];

// ── Easing functions ──
const ease = {
  // Smooth step — classic for gaze arcs
  inOutCubic: t => t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2,

  // Overshoot — curious, alert
  outBack: t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },

  // Slow settle — sleepy
  outQuart: t => 1 - Math.pow(1 - t, 4),

  // Fast snap — attentive saccade
  inOutQuint: t => t < 0.5
    ? 16 * t * t * t * t * t
    : 1 - Math.pow(-2 * t + 2, 5) / 2,
};

// ── State ──
const state = {
  // Current gaze position (normalized -1..1)
  gazeX: 0,
  gazeY: 0,

  // Arc animation
  arc: {
    active: false,
    startX: 0, startY: 0,
    endX:   0, endY:   0,
    ctrlX:  0, ctrlY:  0,  // bezier control point
    t: 0,
    duration: 1,
    easeFn: ease.inOutCubic,
  },

  // Blinking
  blink: {
    t: 0,          // 0=open, 1=closed
    state: 'open', // open | closing | closed | opening
    timer: 0,
    nextBlink: 3,
  },

  // Behavior
  behavior: 'idle',
  behaviorTimer: 0,
};

let lastTime = null;

// ─────────────────────────────────────────────
//  BEHAVIOR CONTROLLER
//  Each behavior returns a config that governs
//  when and how gaze saccades are triggered.
// ─────────────────────────────────────────────

const behaviors = {
  idle: {
    label: 'IDLE',
    gazeRadius:    0.35,
    pauseMin:      1.5,
    pauseMax:      3.5,
    easeFn:        () => ease.inOutCubic,
    speedMult:     1.0,
    blinkMult:     1.0,
    lidOpenness:   () => params.lidOpenness,
  },
  attentive: {
    label: 'ATTENTIVE',
    gazeRadius:    0.15,
    pauseMin:      0.3,
    pauseMax:      0.8,
    easeFn:        () => ease.inOutQuint,
    speedMult:     2.2,
    blinkMult:     0.4,
    lidOpenness:   () => Math.min(1, params.lidOpenness * 1.1),
  },
  curious: {
    label: 'CURIOUS',
    gazeRadius:    0.7,
    pauseMin:      0.5,
    pauseMax:      1.5,
    easeFn:        () => ease.outBack,
    speedMult:     1.4,
    blinkMult:     0.8,
    lidOpenness:   () => params.lidOpenness,
  },
  sleepy: {
    label: 'SLEEPY',
    gazeRadius:    0.2,
    pauseMin:      3.0,
    pauseMax:      6.0,
    easeFn:        () => ease.outQuart,
    speedMult:     0.4,
    blinkMult:     2.5,
    lidOpenness:   () => params.lidOpenness * 0.55,
  },
};

function getBehavior() { return behaviors[state.behavior]; }

// ─────────────────────────────────────────────
//  GAZE SACCADE — arc-based eye movement
// ─────────────────────────────────────────────

function triggerSaccade(targetX, targetY) {
  const beh = getBehavior();
  const arc = state.arc;

  arc.startX = state.gazeX;
  arc.startY = state.gazeY;
  arc.endX   = targetX;
  arc.endY   = targetY;

  // Generate arc control point perpendicular to the path
  const midX = (arc.startX + arc.endX) / 2;
  const midY = (arc.startY + arc.endY) / 2;
  const dx = arc.endX - arc.startX;
  const dy = arc.endY - arc.startY;
  const perpX = -dy;
  const perpY =  dx;
  const curve = params.arcCurvature * (Math.random() > 0.5 ? 1 : -1);
  arc.ctrlX = midX + perpX * curve;
  arc.ctrlY = midY + perpY * curve;

  // Duration based on distance & speed
  const dist = Math.sqrt(dx * dx + dy * dy);
  arc.duration = (0.15 + dist * 0.6) / (params.gazeSpeed * beh.speedMult);
  arc.t = 0;
  arc.easeFn = beh.easeFn();
  arc.active = true;

  logEvent(`saccade → (${targetX.toFixed(2)}, ${targetY.toFixed(2)})`);
}

function randomSaccade() {
  const beh = getBehavior();
  const r   = beh.gazeRadius;
  const jitter = params.saccadeJitter;

  const tx = (Math.random() * 2 - 1) * r + (Math.random() * 2 - 1) * jitter * 0.1;
  const ty = (Math.random() * 2 - 1) * r * 0.6 + (Math.random() * 2 - 1) * jitter * 0.1;

  triggerSaccade(
    Math.max(-0.9, Math.min(0.9, tx)),
    Math.max(-0.7, Math.min(0.7, ty))
  );
}

// ─────────────────────────────────────────────
//  BEZIER POINT ALONG ARC
// ─────────────────────────────────────────────

function bezierPoint(t, p0, p1, p2) {
  const mt = 1 - t;
  return mt * mt * p0 + 2 * mt * t * p1 + t * t * p2;
}

// ─────────────────────────────────────────────
//  BLINK CONTROLLER
// ─────────────────────────────────────────────

function updateBlink(dt) {
  const b = state.blink;
  const beh = getBehavior();

  if (b.state === 'open') {
    b.timer += dt;
    const interval = params.blinkInterval / beh.blinkMult;
    if (b.timer >= interval) {
      b.state = 'closing';
      b.t = 0;
      b.timer = 0;
      logEvent('blink');
    }
  } else if (b.state === 'closing') {
    b.t += dt / 0.07;
    if (b.t >= 1) { b.t = 1; b.state = 'closed'; }
  } else if (b.state === 'closed') {
    b.timer += dt;
    if (b.timer >= 0.05) { b.state = 'opening'; b.t = 1; b.timer = 0; }
  } else if (b.state === 'opening') {
    b.t -= dt / 0.12;
    if (b.t <= 0) { b.t = 0; b.state = 'open'; }
  }
}

// ─────────────────────────────────────────────
//  UPDATE LOOP
// ─────────────────────────────────────────────

function update(dt) {
  const beh = getBehavior();

  // Update arc animation
  if (state.arc.active) {
    state.arc.t += dt / state.arc.duration;
    if (state.arc.t >= 1) {
      state.arc.t = 1;
      state.arc.active = false;
      state.gazeX = state.arc.endX;
      state.gazeY = state.arc.endY;
      // Schedule next saccade
      state.behaviorTimer = -(beh.pauseMin + Math.random() * (beh.pauseMax - beh.pauseMin));
    } else {
      const et = state.arc.easeFn(state.arc.t);
      state.gazeX = bezierPoint(et, state.arc.startX, state.arc.ctrlX, state.arc.endX);
      state.gazeY = bezierPoint(et, state.arc.startY, state.arc.ctrlY, state.arc.endY);
    }
  }

  // Behavior timer (negative = waiting, 0 = trigger)
  if (!state.arc.active) {
    state.behaviorTimer += dt;
    if (state.behaviorTimer >= 0) {
      randomSaccade();
    }
  }

  updateBlink(dt);
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────

function drawEye(eye) {
  const { cx, cy, rx, ry } = eye;
  const beh = getBehavior();

  const pupilX = cx + state.gazeX * (rx * 0.45);
  const pupilY = cy + state.gazeY * (ry * 0.45);

  const targetOpen = beh.lidOpenness();
  const openness   = targetOpen * (1 - state.blink.t);

  // ── Glow ──
  const glow = ctx.createRadialGradient(cx, cy, 10, cx, cy, rx * 1.4);
  glow.addColorStop(0, hexToRgba(colors.glowColor, 0.06));
  glow.addColorStop(1, hexToRgba(colors.glowColor, 0));
  ctx.fillStyle = glow;
  ctx.fillRect(cx - rx * 1.6, cy - ry * 2, rx * 3.2, ry * 4);

  // ── Clip to eye shape ──
  ctx.save();
  ctx.beginPath();
  eyePath(cx, cy, rx, ry, openness);
  ctx.clip();

  // Sclera
  const scleraGrad = ctx.createRadialGradient(cx, cy - ry * 0.1, 5, cx, cy, rx);
  scleraGrad.addColorStop(0, colors.scleraLight);
  scleraGrad.addColorStop(1, colors.scleraDark);
  ctx.fillStyle = scleraGrad;
  ctx.fill();

  // Iris
  const irisR = rx * 0.42;
  const irisGrad = ctx.createRadialGradient(pupilX - irisR * 0.2, pupilY - irisR * 0.2, 2, pupilX, pupilY, irisR);
  irisGrad.addColorStop(0, colors.irisHighlight);
  irisGrad.addColorStop(0.4, colors.irisMid);
  irisGrad.addColorStop(1, colors.irisDeep);
  ctx.beginPath();
  ctx.arc(pupilX, pupilY, irisR, 0, Math.PI * 2);
  ctx.fillStyle = irisGrad;
  ctx.fill();

  // Iris detail lines
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(pupilX + Math.cos(angle) * irisR * 0.35, pupilY + Math.sin(angle) * irisR * 0.35);
    ctx.lineTo(pupilX + Math.cos(angle) * irisR * 0.95, pupilY + Math.sin(angle) * irisR * 0.95);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  ctx.restore();

  // Pupil
  const pupilR = irisR * params.pupilSize / 0.38;
  const pupilGrad = ctx.createRadialGradient(pupilX, pupilY, 0, pupilX, pupilY, pupilR);
  pupilGrad.addColorStop(0, colors.pupilColor);
  pupilGrad.addColorStop(1, colors.pupilColor);
  ctx.beginPath();
  ctx.arc(pupilX, pupilY, pupilR, 0, Math.PI * 2);
  ctx.fillStyle = pupilGrad;
  ctx.fill();

  // Catchlight
  ctx.beginPath();
  ctx.arc(pupilX - pupilR * 0.28, pupilY - pupilR * 0.28, pupilR * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fill();

  // Small secondary catchlight
  ctx.beginPath();
  ctx.arc(pupilX + pupilR * 0.3, pupilY - pupilR * 0.15, pupilR * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  ctx.restore(); // end clip

  // ── Eyelid stroke ──
  ctx.beginPath();
  eyePath(cx, cy, rx, ry, openness);
  ctx.strokeStyle = 'rgba(20,20,30,0.9)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // ── Upper lid shadow ──
  ctx.save();
  ctx.beginPath();
  eyePath(cx, cy, rx, ry, openness);
  ctx.clip();
  const lidShadow = ctx.createLinearGradient(cx, cy - ry * openness, cx, cy - ry * openness * 0.3);
  lidShadow.addColorStop(0, 'rgba(15,15,25,0.5)');
  lidShadow.addColorStop(1, 'rgba(15,15,25,0)');
  ctx.fillStyle = lidShadow;
  ctx.fillRect(cx - rx - 10, cy - ry * 2, (rx + 10) * 2, ry * 2);
  ctx.restore();

  // ── Arc trajectory visualization (debug) ──
  if (state.arc.active) {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.beginPath();
    const steps = 30;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const bx = bezierPoint(t, state.arc.startX, state.arc.ctrlX, state.arc.endX);
      const by = bezierPoint(t, state.arc.startY, state.arc.ctrlY, state.arc.endY);
      const px = cx + bx * (rx * 0.45);
      const py = cy + by * (ry * 0.45);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.strokeStyle = colors.glowColor;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 4]);
    ctx.stroke();
    ctx.restore();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  EYES.forEach(eye => drawEye(eye));

  // ── Behavior label ──
  const beh = getBehavior();
  ctx.font = '700 10px Space Mono';
  ctx.fillStyle = hexToRgba(colors.glowColor, 0.4);
  ctx.letterSpacing = '0.2em';
  ctx.fillText(beh.label, 24, canvas.height - 24);
}

// ─────────────────────────────────────────────
//  EYE PATH HELPER
// ─────────────────────────────────────────────

function eyePath(cx, cy, rx, ry, openness) {
  const top    = cy - ry * openness;
  const bottom = cy + ry * 0.75;

  ctx.moveTo(cx - rx, cy);
  // Upper lid
  ctx.bezierCurveTo(
    cx - rx * 0.5, top,
    cx + rx * 0.5, top,
    cx + rx, cy
  );
  // Lower lid
  ctx.bezierCurveTo(
    cx + rx * 0.5, bottom,
    cx - rx * 0.5, bottom,
    cx - rx, cy
  );
}

// ─────────────────────────────────────────────
//  MOUSE CONTROL — click to look
// ─────────────────────────────────────────────

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Map relative to canvas center so both eyes look toward the click
  const nx = (mx - canvas.width  / 2) / (canvas.width  / 2 * 0.9);
  const ny = (my - canvas.height / 2) / (canvas.height / 2 * 0.9);
  const tx = Math.max(-0.9, Math.min(0.9, nx));
  const ty = Math.max(-0.7, Math.min(0.7, ny));
  triggerSaccade(tx, ty);
  state.behaviorTimer = -2;
});

// ─────────────────────────────────────────────
//  RAF LOOP
// ─────────────────────────────────────────────

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// ─────────────────────────────────────────────
//  DESIGN TOOLING (ported from r1_face/designer)
// ─────────────────────────────────────────────

function toggleAcc(id) {
  document.getElementById(id).classList.toggle('open');
}

function makeColorRow(key, label) {
  const row = document.createElement('div');
  row.className = 'color-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'color';
  inp.value = colors[key];
  const hex = document.createElement('span');
  hex.className = 'hex';
  hex.textContent = colors[key];
  inp.addEventListener('input', () => {
    colors[key] = inp.value;
    hex.textContent = inp.value;
  });
  row.appendChild(lbl);
  row.appendChild(inp);
  row.appendChild(hex);
  return row;
}

function buildColorPanel() {
  const panel = document.getElementById('panel-colors');
  panel.innerHTML = '';
  [
    ['irisHighlight', 'Iris highlight'],
    ['irisMid',       'Iris mid'],
    ['irisDeep',      'Iris deep'],
    ['glowColor',     'Glow'],
    ['scleraLight',   'Sclera light'],
    ['scleraDark',    'Sclera dark'],
    ['pupilColor',    'Pupil'],
  ].forEach(([key, label]) => panel.appendChild(makeColorRow(key, label)));
}

function exportConfig() {
  document.getElementById('load-wrap').classList.remove('visible');
  const cfg = { params: { ...params }, colors: { ...colors } };
  document.getElementById('export-out').textContent = JSON.stringify(cfg, null, 2);
  document.getElementById('export-wrap').classList.toggle('visible');
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-out').textContent).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function toggleLoadWrap() {
  document.getElementById('export-wrap').classList.remove('visible');
  document.getElementById('load-wrap').classList.toggle('visible');
}

function applyLoadedConfig() {
  const raw = document.getElementById('load-in').value.trim();
  const err = document.getElementById('load-error');
  err.textContent = '';
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch (e) { err.textContent = 'Invalid JSON: ' + e.message; return; }
  if (typeof parsed !== 'object' || parsed === null) {
    err.textContent = 'Expected a JSON object.'; return;
  }
  if (parsed.params) Object.assign(params, parsed.params);
  if (parsed.colors) Object.assign(colors, parsed.colors);
  [
    ['ctrl-curve',  'val-curve',  'arcCurvature'],
    ['ctrl-speed',  'val-speed',  'gazeSpeed'],
    ['ctrl-jitter', 'val-jitter', 'saccadeJitter'],
    ['ctrl-open',   'val-open',   'lidOpenness'],
    ['ctrl-pupil',  'val-pupil',  'pupilSize'],
    ['ctrl-blink',  'val-blink',  'blinkInterval'],
  ].forEach(([ctrlId, valId, key]) => {
    const el = document.getElementById(ctrlId);
    if (el) {
      el.value = params[key];
      document.getElementById(valId).textContent = parseFloat(params[key]).toFixed(2);
    }
  });
  buildColorPanel();
  document.getElementById('load-wrap').classList.remove('visible');
  logEvent('config loaded');
}

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────

function setBehavior(name) {
  state.behavior = name;
  state.behaviorTimer = -0.3;
  document.querySelectorAll('.behavior-buttons button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  logEvent(`behavior → ${name}`);
}

function updateParam(key, value, labelId) {
  params[key] = parseFloat(value);
  document.getElementById(labelId).textContent = parseFloat(value).toFixed(2);
}

const logEl = document.getElementById('log');
const logHistory = [];

function logEvent(msg) {
  const time = new Date().toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  logHistory.unshift({ time, msg });
  if (logHistory.length > 20) logHistory.pop();
  logEl.innerHTML = logHistory.map(e =>
    `<div><span>${e.time}</span>${e.msg}</div>`
  ).join('');
}

buildColorPanel();
logEvent('system ready');
logEvent('behavior → idle');

</script>
