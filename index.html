<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAZER</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --iris: #4af7c4;
  --iris-dim: #1a6652;
  --pupil: #050508;
  --sclera: #e8eaf0;
  --glow: rgba(74, 247, 196, 0.3);
  --text: #8888aa;
  --text-bright: #ccccee;
  --accent: #ff6b6b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text-bright);
  font-family: 'Space Mono', monospace;
  height: 100vh;
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}

header {
  grid-column: 1 / -1;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 16px;
}

header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--iris);
}

header span {
  font-size: 11px;
  color: var(--text);
  letter-spacing: 0.1em;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--iris);
  display: inline-block;
  margin-right: 8px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* CANVAS STAGE */
.stage {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 24px;
  background: var(--bg);
  position: relative;
  overflow: auto;
  min-height: 0;
}

.stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(74,247,196,0.04) 0%, transparent 70%);
  pointer-events: none;
}

canvas {
  cursor: crosshair;
  max-width: 100%;
  max-height: 100%;
}

/* CONTROL PANEL */
.panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.panel-section h2 {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.control-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

.control-row label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-bright);
  display: flex;
  justify-content: space-between;
}

.control-row label span {
  color: var(--iris);
  font-weight: 700;
}

.control-row-checkbox {
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.control-row-checkbox label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-bright);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.control-row-checkbox input[type="checkbox"] {
  accent-color: var(--iris);
  width: 14px;
  height: 14px;
  cursor: pointer;
}

.control-row-child {
  padding-left: 16px;
  border-left: 2px solid var(--border);
  margin-left: 4px;
}

input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  height: 3px;
  background: #3a3a5c;
  outline: none;
  border-radius: 2px;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--iris);
  cursor: pointer;
  box-shadow: 0 0 8px var(--glow);
}

.behavior-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}

button:hover {
  border-color: var(--iris);
  color: var(--iris);
  box-shadow: 0 0 12px var(--glow);
}

button.active {
  background: var(--iris);
  color: var(--bg);
  border-color: var(--iris);
  font-weight: 700;
}

.left-panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  min-height: 0;
}

.log {
  font-size: 10px;
  color: var(--text);
  line-height: 1.8;
}

.log div {
  padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.log div span {
  color: var(--iris);
  margin-right: 6px;
  opacity: 0.6;
}

/* Accordions */
.accordion { margin-bottom: 4px; }
.acc-header {
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0 0 8px 0;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: none;
}
.acc-header:hover { color: var(--text-bright); border-color: var(--iris); box-shadow: none; }
.chevron { transition: transform 0.2s ease; display: inline-block; }
.accordion.open .chevron { transform: rotate(180deg); }
.acc-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
.accordion.open .acc-body { max-height: 2000px; }
.acc-inner { padding-top: 16px; padding-bottom: 8px; }

/* Color rows */
.color-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.color-row label { flex: 1; font-size: 10px; letter-spacing: 0.1em; color: var(--text-bright); }
.color-row input[type="color"] {
  width: 40px;
  height: 24px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: none;
  cursor: pointer;
  padding: 1px;
}
.color-row .hex { color: var(--iris); font-size: 10px; width: 60px; }

/* Export / Import */
.export-wrap, .load-wrap { display: none; margin-top: 12px; }
.export-wrap.visible, .load-wrap.visible { display: block; }
textarea.json-area {
  width: 100%;
  height: 90px;
  background: #08080e;
  border: 1px solid var(--border);
  color: var(--iris);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 8px;
  resize: vertical;
  border-radius: 2px;
  box-sizing: border-box;
}
.error-msg { color: var(--accent); font-size: 9px; margin-top: 4px; }
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn-row button { flex: 1; font-size: 9px; padding: 8px; }

/* WebSocket panel */
.ws-status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.ws-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--border);
}
.ws-dot.connecting { background: #f5a623; animation: pulse 1s ease-in-out infinite; }
.ws-dot.connected  { background: var(--iris); animation: pulse 2s ease-in-out infinite; }
.ws-dot.error      { background: var(--accent); }
.ws-status-text {
  font-size: 10px;
  color: var(--text);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.ws-url-input {
  width: 100%;
  background: #08080e;
  border: 1px solid var(--border);
  color: var(--iris);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 7px 8px;
  border-radius: 2px;
  outline: none;
  box-sizing: border-box;
}
.ws-url-input:focus { border-color: var(--iris); }

/* 3D view toggle */
.view-toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.view-toggle-row label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  cursor: pointer;
  user-select: none;
}

/* 3D stage */
.stage { position: relative; }
#three-stage {
  position: absolute;
  inset: 0;
  display: none;
}
.stage.mode-3d #three-stage { display: block; }
/* keep canvas rendering (texture source) but hide it visually */
.stage.mode-3d > #canvas { opacity: 0; pointer-events: none; }

/* Grid toggle */
.grid-toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0 4px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.grid-toggle-row label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  cursor: pointer;
  user-select: none;
}
input[type="checkbox"].grid-cb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}
input[type="checkbox"].grid-cb:checked {
  background: var(--iris);
  border-color: var(--iris);
}
input[type="checkbox"].grid-cb:checked::after {
  content: '';
  position: absolute;
  left: 3px; top: 1px;
  width: 5px; height: 8px;
  border: 2px solid var(--bg);
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}

  </style>
</head>
<body>

<header>
  <h1><span class="status-dot"></span>Gazer</h1>
  <span>v0.1 — robot eye behavior system</span>
</header>

<div class="left-panel">
  <div class="view-toggle-row">
    <input type="checkbox" class="grid-cb" id="toggle-3d" onchange="toggle3D(this.checked)" />
    <label for="toggle-3d">3D View</label>
  </div>
  <div class="accordion" id="acc-ws">
    <button class="acc-header" onclick="toggleAcc('acc-ws')">
      WebSocket API <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner">
      <div class="ws-status-row">
        <span class="ws-dot" id="ws-dot"></span>
        <span class="ws-status-text" id="ws-status-text">disconnected</span>
      </div>
      <div class="control-row">
        <label>Server URL</label>
        <input class="ws-url-input" type="text" id="ws-url" value="ws://localhost:8765" />
      </div>
      <div class="btn-row">
        <button onclick="wsConnect()">Connect</button>
        <button onclick="wsDisconnect()">Disconnect</button>
      </div>
    </div></div>
  </div>
  <div class="log" id="log"></div>
</div>

<div class="stage">
  <canvas id="canvas" width="600" height="600"></canvas>
  <div id="three-stage"></div>
</div>

<div class="panel">

  <div class="accordion" id="acc-behavior">
    <button class="acc-header" onclick="toggleAcc('acc-behavior')">
      Behavior <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner">
      <div class="behavior-buttons">
        <button id="btn-idle" class="active" onclick="setBehavior('idle')">Idle</button>
        <button id="btn-attentive" onclick="setBehavior('attentive')">Attentive</button>
        <button id="btn-curious" onclick="setBehavior('curious')">Curious</button>
        <button id="btn-sleepy" onclick="setBehavior('sleepy')">Sleepy</button>
      </div>
    </div></div>
  </div>

  <div class="accordion" id="acc-eye-shape">
    <button class="acc-header" onclick="toggleAcc('acc-eye-shape')">
      Eye Shape <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-eye"></div></div>
  </div>

  <div class="accordion" id="acc-pupil">
    <button class="acc-header" onclick="toggleAcc('acc-pupil')">
      Pupil <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-pupil"></div></div>
  </div>

  <div class="accordion" id="acc-nose">
    <button class="acc-header" onclick="toggleAcc('acc-nose')">
      Nose <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-nose"></div></div>
  </div>

  <div class="accordion" id="acc-mouth">
    <button class="acc-header" onclick="toggleAcc('acc-mouth')">
      Mouth <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-mouth"></div></div>
  </div>

  <div class="accordion" id="acc-brow">
    <button class="acc-header" onclick="toggleAcc('acc-brow')">
      Brows <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-brow"></div></div>
  </div>

  <div class="accordion" id="acc-lids">
    <button class="acc-header" onclick="toggleAcc('acc-lids')">
      Lids <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-lids"></div></div>
  </div>

  <div class="accordion" id="acc-blink">
    <button class="acc-header" onclick="toggleAcc('acc-blink')">
      Blink <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-blink"></div></div>
  </div>

  <div class="accordion" id="acc-gaze">
    <button class="acc-header" onclick="toggleAcc('acc-gaze')">
      Gaze <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-gaze"></div></div>
  </div>

  <div class="accordion" id="acc-motion">
    <button class="acc-header" onclick="toggleAcc('acc-motion')">
      Motion Cascade <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-motion"></div></div>
  </div>

  <div class="accordion" id="acc-anim">
    <button class="acc-header" onclick="toggleAcc('acc-anim')">
      Animation <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-anim"></div></div>
  </div>

  <div class="accordion" id="acc-trail">
    <button class="acc-header" onclick="toggleAcc('acc-trail')">
      Overlays <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-trail"></div></div>
  </div>

  <div class="accordion" id="acc-colors">
    <button class="acc-header" onclick="toggleAcc('acc-colors')">
      Colors <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner" id="panel-colors"></div></div>
  </div>

  <div class="accordion" id="acc-export">
    <button class="acc-header" onclick="toggleAcc('acc-export')">
      Export / Import <span class="chevron">▾</span>
    </button>
    <div class="acc-body"><div class="acc-inner">
      <div class="btn-row">
        <button onclick="exportConfig()">Export JSON</button>
        <button onclick="toggleLoadWrap()">Import JSON</button>
      </div>
      <div class="export-wrap" id="export-wrap">
        <textarea class="json-area" id="export-out" readonly></textarea>
        <div class="btn-row">
          <button onclick="copyExport()">Copy</button>
          <button onclick="document.getElementById('export-wrap').classList.remove('visible')">Close</button>
        </div>
      </div>
      <div class="load-wrap" id="load-wrap">
        <textarea class="json-area" id="load-in" placeholder="Paste config JSON here..."></textarea>
        <div class="error-msg" id="load-error"></div>
        <div class="btn-row">
          <button onclick="applyLoadedConfig()">Apply</button>
          <button onclick="document.getElementById('load-wrap').classList.remove('visible')">Cancel</button>
        </div>
      </div>
    </div></div>
  </div>


</div>

<script>
// ─────────────────────────────────────────────
//  GAZER — Robot Eye Behavior System
//  v0.1 — browser proof of concept
// ─────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Parameters (all tweakable) ──
const params = {
  // ── Eye Shape ──
  eyeRx:           70,
  eyeRy:           70,
  eyeRotation:     0,
  eyeCenterX:      300,
  eyeCenterY:      260,
  eyeSpacing:      220,
  pupilSpacing:    0,

  // ── Pupil ──
  pupilSize:       0.40,
  pupilTravel:     0.38,
  pupilBiasX:      0,
  pupilBiasY:      0,

  // ── Brows ──
  browSpacing:     220,  // mirrors eyeSpacing
  browOffsetY:     90,   // pixels above eye center
  browWidth:       130,
  browThickness:   14,
  browArch:        18,   // arch height in pixels
  browRotation:    0,    // degrees, mirrored like eyes
  browTaperInner:  0,    // taper at bridge/nose end (0 = round cap, 1 = sharp point)
  browTaperOuter:  0,    // taper at temple/tip end

  // ── Overlays ──
  showTrail:       false,
  trailDuration:   3,    // seconds to remember
  showSTI:         false,
  stiPersist:      false, // keep target visible between saccades
  stiSize:         8,    // radius in pixels
  showGrid:        false,

  // ── Visibility ──
  showMouth:       true,
  showBrows:       true,
  showPupil:       true,
  showLids:        true,

  // ── Nose ──
  showNose:        false,
  noseOffsetY:     55,   // pixels below eye center Y
  noseBridgeH:     20,   // bridge height
  noseWidth:       28,   // nostril spread
  noseWingH:       8,    // how far nostrils drop below bridge base
  noseWingCurve:   4,    // outward flare of nostril bezier
  noseThickness:   6,

  // ── Mouth ──
  mouthOffsetY:    110,  // pixels below eye center Y
  mouthWidth:      120,
  mouthThickness:  10,
  mouthCurve:      0,    // pixels: positive = smile, negative = frown
  mouthTaper:      0,    // 0 = uniform, 1 = tapers to points at corners

  // ── Lids ──
  upperLidPos:     0,    // 0 = fully open, 1 = closed to center
  lowerLidPos:     0,
  lidCurvature:    0,    // -1 = concave, 0 = straight, 1 = convex
  lidRotation:     0,    // degrees, tilts both lids relative to the eye

  // ── Blink ──
  lidOpenness:     0.85,
  blinkInterval:   3.0,
  blinkCloseSpeed: 0.07,
  blinkOpenSpeed:  0.12,
  blinkHold:       0.05,
  doubleBlink:     0.15,

  // ── Gaze ──
  arcCurvature:    0.40,
  gazeSpeed:       0.60,
  saccadeJitter:   0.20,
  gazeRangeX:      1.00,
  gazeRangeY:      0.60,
  pauseMin:        1.50,
  pauseMax:        3.50,
  microSaccade:    0.02,

  // ── Motion Cascade (pupils → face → head → body) ──
  faceTranslateAmt:   0,   // px face shifts toward gaze target
  faceTranslateSpeed: 1.5, // lerp speed (fast follower)
  headTurnAmt:        0,   // px head shifts in 2D (slower, larger range)
  headTurnSpeed:      0.6, // lerp speed
  headRotationMax:    25,  // degrees — max 3D head yaw
  head3DSpeed:        0.04, // lerp speed for 3D head yaw/pitch (independent of 2D cascade)
  bodyShiftAmt:       0,   // px body shifts in 2D (slowest)
  bodyShiftSpeed:     0.3, // lerp speed
  bodyRotationMax:    10,  // degrees — max 3D body yaw
  body3DSpeed:        0.02, // lerp speed for 3D body yaw

  // ── Anticipation (saccade) ──
  anticipationAmt: 0,     // 0 = off; 0.1–0.4 = wind-up distance (ratio of saccade dist)
  anticipationDur: 0.08,  // seconds for wind-up move

  // ── Follow-through (saccade) ──
  overshootAmt:    0,     // 0 = off; 0.1–0.4 = overshoot distance (ratio of saccade dist)
  overshootDamp:   10,    // spring damping  — higher = less oscillation
  overshootStiff:  140,   // spring stiffness — higher = snappier return

  // ── Squash & stretch ──
  squashStretch:   0.25,  // max deformation (0 = off)

  // ── Blink facial reactions ──
  blinkBrowReact:  false,
  blinkBrowAmt:    6,     // pixels brow lowers when closing
  blinkMouthReact: false,
  blinkMouthAmt:   8,     // curve shift when closing
  blinkReactDamp:  8,     // 1=sluggish, 20=snappy

  // ── Blink anticipation ──
  blinkAntAmt:     0,     // 0 = off; how much the eye widens before closing (0–0.3)
  blinkAntDur:     0.06,  // seconds for widening

  // ── Blink follow-through ──
  blinkOvAmt:      0,     // 0 = off; how much the eye widens after opening (0–0.3)
  blinkOvDamp:     8,     // spring damping
  blinkOvStiff:    120,   // spring stiffness
};

// ── Color params ──
const colors = {
  stageBg:    '#0a0a0f',
  canvasBg:   '#131318',
  eyeColor:   '#ffffff',
  pupilColor: '#000000',
  glowColor:  '#4af7c4',
  lidColor:   '#131318',
  browColor:  '#ffffff',
  noseColor:  '#ffffff',
  mouthColor: '#ffffff',
  trailColor: '#ff4444',
  stiColor:   '#4af7c4',
  floorColor:  '#18181f',
  robotColor:  '#e2e2e0',
  wheelColor:  '#202028',
};

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Eye geometry — computed each frame from params ──
function getEyes() {
  const half = params.eyeSpacing / 2;
  const rot  = params.eyeRotation * Math.PI / 180;
  return [
    { cx: params.eyeCenterX - half, cy: params.eyeCenterY, rx: params.eyeRx, ry: params.eyeRy, rot: -rot, sign: -1 },
    { cx: params.eyeCenterX + half, cy: params.eyeCenterY, rx: params.eyeRx, ry: params.eyeRy, rot,         sign:  1 },
  ];
}

// ── Easing functions ──
const ease = {
  // Smooth step — classic for gaze arcs
  inOutCubic: t => t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2,

  // Overshoot — curious, alert
  outBack: t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },

  // Slow settle — sleepy
  outQuart: t => 1 - Math.pow(1 - t, 4),

  // Fast snap — attentive saccade
  inOutQuint: t => t < 0.5
    ? 16 * t * t * t * t * t
    : 1 - Math.pow(-2 * t + 2, 5) / 2,
};

// ── State ──
const state = {
  // Current gaze position (normalized -1..1)
  gazeX: 0,
  gazeY: 0,

  // Arc animation
  arc: {
    phase:    'idle',  // 'anticipation' | 'main' | 'followthrough'
    active:   false,   // true when phase !== 'idle'
    curveSign: 1,      // persisted random direction of arc curve

    // Main bezier arc
    startX: 0, startY: 0,
    endX:   0, endY:   0,
    ctrlX:  0, ctrlY:  0,
    t: 0,
    duration: 1,
    easeFn: ease.inOutCubic,

    // Anticipation (wind-up)
    antT:  0,
    antDur: 0.08,
    antOX: 0, antOY: 0,  // origin of wind-up
    antTX: 0, antTY: 0,  // wind-up target (opposite direction)

    // Follow-through (spring)
    ftVX: 0, ftVY: 0,    // spring velocity
    ftTimer: 0,
  },

  // Blinking
  blink: {
    t: 0,          // 0=open, 1=closed; negative = wider than normal
    state: 'open', // open | anticipating | closing | closed | opening | followthrough
    timer: 0,
    nextBlink: 3,
    ftVel: 0,      // spring velocity for follow-through
  },

  // Behavior
  behavior: 'idle',
  behaviorTimer: 0,

  // Arc trail
  trailPoints: [],  // { x, y, t }
  now: 0,           // running time in seconds

  // Blink reaction (smoothed blink.t for facial reactions)
  blinkReact: 0,

  // Motion cascade offsets (all compound in draw)
  faceX: 0, faceY: 0,
  headX: 0, headY: 0,
  bodyX: 0, bodyY: 0,

  // 3D rotation state (drives Three.js head/body)
  head3DYaw:   0,   // degrees, positive = right
  head3DPitch: 0,   // degrees, positive = down
  body3DYaw:          0,   // degrees, positive = right
  gazeTargetActive:   false, // true while ball drag overrides body rotation

  // Squash & stretch
  squashAmt:   0,   // current deformation (+ = stretch along travel, - = squash)
  squashVel:   0,   // spring velocity for landing squash return
  squashAngle: 0,   // angle of stretch axis (radians, in canvas space)
};

let lastTime = null;

// ─────────────────────────────────────────────
//  BEHAVIOR CONTROLLER
//  Each behavior returns a config that governs
//  when and how gaze saccades are triggered.
// ─────────────────────────────────────────────

const behaviors = {
  idle: {
    label: 'IDLE',
    gazeRadius:    0.35,
    pauseMin:      1.5,
    pauseMax:      3.5,
    easeFn:        () => ease.inOutCubic,
    speedMult:     1.0,
    blinkMult:     1.0,
    lidOpenness:   () => params.lidOpenness,
    // Slight natural droop on upper lid — relaxed, not fully awake
    upperLid:      () => Math.min(1, params.upperLidPos + 0.10),
    lowerLid:      () => Math.min(1, params.lowerLidPos + 0.00),
    // Neutral brows, very slight natural arch
    browRaise:     () => 0,
    browTilt:      () => 0,
    browArch:      () => 0,
    // Slight resting smile — at ease
    mouthCurve:    () => 8,
  },
  attentive: {
    label: 'ATTENTIVE',
    gazeRadius:    0.15,
    pauseMin:      0.3,
    pauseMax:      0.8,
    easeFn:        () => ease.inOutQuint,
    speedMult:     2.2,
    blinkMult:     0.4,
    lidOpenness:   () => Math.min(1, params.lidOpenness * 1.1),
    // Lids pulled wide open — alert, tracking
    upperLid:      () => Math.max(0, params.upperLidPos - 0.05),
    lowerLid:      () => Math.min(1, params.lowerLidPos + 0.06),
    // Brows raised and pulled inward — focused, intent
    browRaise:     () => 12,
    browTilt:      () => 4,   // inner corners down = stern focus
    browArch:      () => 6,
    // Tight flat line — serious, focused
    mouthCurve:    () => -6,
  },
  curious: {
    label: 'CURIOUS',
    gazeRadius:    0.7,
    pauseMin:      0.5,
    pauseMax:      1.5,
    easeFn:        () => ease.outBack,
    speedMult:     1.4,
    blinkMult:     0.8,
    lidOpenness:   () => params.lidOpenness,
    // Neutral lids — open and scanning, no strong expression
    upperLid:      () => Math.min(1, params.upperLidPos + 0.02),
    lowerLid:      () => Math.min(1, params.lowerLidPos + 0.00),
    // One brow effectively raised — quizzical, outer corners tilted up
    browRaise:     () => 8,
    browTilt:      () => -6,  // outer corners down = quizzical
    browArch:      () => 10,
    // Open slight smile — engaged, interested
    mouthCurve:    () => 16,
  },
  sleepy: {
    label: 'SLEEPY',
    gazeRadius:    0.2,
    pauseMin:      3.0,
    pauseMax:      6.0,
    easeFn:        () => ease.outQuart,
    speedMult:     0.4,
    blinkMult:     2.5,
    lidOpenness:   () => params.lidOpenness * 0.55,
    // Heavy upper lid droop, lower lid closing in — drowsy
    upperLid:      () => Math.min(1, params.upperLidPos + 0.35),
    lowerLid:      () => Math.min(1, params.lowerLidPos + 0.12),
    // Brows low and drooping outward — heavy, sad, tired
    browRaise:     () => -14,
    browTilt:      () => -8,  // outer corners down = sad/droopy
    browArch:      () => -8,
    // Droopy frown — tired, sad
    mouthCurve:    () => -18,
  },
};

function getBehavior() { return behaviors[state.behavior]; }

// ─────────────────────────────────────────────
//  GAZE SACCADE — arc-based eye movement
// ─────────────────────────────────────────────

// Compute bezier ctrl point + duration for a given start→end, using arc.curveSign
function setupArcSegment(startX, startY, endX, endY) {
  const beh = getBehavior();
  const arc = state.arc;
  const dx = endX - startX;
  const dy = endY - startY;
  const midX = (startX + endX) / 2;
  const midY = (startY + endY) / 2;
  const curve = params.arcCurvature * arc.curveSign;
  arc.startX   = startX;
  arc.startY   = startY;
  arc.endX     = endX;
  arc.endY     = endY;
  arc.ctrlX    = midX + (-dy) * curve;
  arc.ctrlY    = midY + ( dx) * curve;
  const dist   = Math.sqrt(dx * dx + dy * dy);
  arc.duration = (0.15 + dist * 0.6) / (params.gazeSpeed * beh.speedMult);
  arc.t        = 0;
  arc.easeFn   = beh.easeFn();
}

function triggerSaccade(targetX, targetY) {
  const arc = state.arc;
  arc.curveSign = Math.random() > 0.5 ? 1 : -1;

  if (params.anticipationAmt > 0) {
    // Wind-up: move opposite the target direction first
    const dx = targetX - state.gazeX;
    const dy = targetY - state.gazeY;
    arc.antOX  = state.gazeX;
    arc.antOY  = state.gazeY;
    arc.antTX  = state.gazeX - dx * params.anticipationAmt;
    arc.antTY  = state.gazeY - dy * params.anticipationAmt;
    arc.antT   = 0;
    arc.antDur = Math.max(0.02, params.anticipationDur);
    // Store final target so we can set up the main arc after wind-up
    arc.endX   = targetX;
    arc.endY   = targetY;
    arc.phase  = 'anticipation';
    arc.active = true;
  } else {
    setupArcSegment(state.gazeX, state.gazeY, targetX, targetY);
    arc.phase  = 'main';
    arc.active = true;
  }

  logEvent(`saccade → (${targetX.toFixed(2)}, ${targetY.toFixed(2)})`);
}

function randomSaccade() {
  const beh = getBehavior();
  const r = beh.gazeRadius;
  const jitter = params.saccadeJitter;

  const tx = (Math.random() * 2 - 1) * r * params.gazeRangeX + (Math.random() * 2 - 1) * jitter * 0.1;
  const ty = (Math.random() * 2 - 1) * r * params.gazeRangeY + (Math.random() * 2 - 1) * jitter * 0.1;

  triggerSaccade(
    Math.max(-0.9, Math.min(0.9, tx)),
    Math.max(-0.9, Math.min(0.9, ty))
  );
}

// ─────────────────────────────────────────────
//  BEZIER POINT ALONG ARC
// ─────────────────────────────────────────────

function bezierPoint(t, p0, p1, p2) {
  const mt = 1 - t;
  return mt * mt * p0 + 2 * mt * t * p1 + t * t * p2;
}

// ─────────────────────────────────────────────
//  BLINK CONTROLLER
// ─────────────────────────────────────────────

function updateBlink(dt) {
  const b = state.blink;
  const beh = getBehavior();

  if (b.state === 'open') {
    b.timer += dt;
    const interval = params.blinkInterval / beh.blinkMult;
    if (b.timer >= interval) {
      b.timer = 0;
      logEvent('blink');
      if (params.blinkAntAmt > 0) {
        // Widen before closing
        b.state = 'anticipating';
      } else {
        b.state = 'closing';
        b.t = 0;
      }
    }

  } else if (b.state === 'anticipating') {
    // t drifts toward -blinkAntAmt (wider than normal)
    const target = -params.blinkAntAmt;
    b.t -= dt / Math.max(0.01, params.blinkAntDur);
    if (b.t <= target) {
      b.t = target;
      b.state = 'closing';
    }

  } else if (b.state === 'closing') {
    b.t += dt / Math.max(0.01, params.blinkCloseSpeed);
    if (b.t >= 1) { b.t = 1; b.state = 'closed'; }

  } else if (b.state === 'closed') {
    b.timer += dt;
    if (b.timer >= params.blinkHold) { b.state = 'opening'; b.t = 1; b.timer = 0; }

  } else if (b.state === 'opening') {
    b.t -= dt / Math.max(0.01, params.blinkOpenSpeed);
    if (b.t <= 0) {
      b.t = 0;
      if (params.blinkOvAmt > 0) {
        // Overshoot past fully-open, spring back
        b.t     = -params.blinkOvAmt;
        b.ftVel = 0;
        b.state = 'followthrough';
      } else {
        b.state = 'open';
        if (Math.random() < params.doubleBlink) {
          b.state = 'closing';
          logEvent('blink ×2');
        }
      }
    }

  } else if (b.state === 'followthrough') {
    // Damped spring back to t=0 (normal open)
    b.ftVel += (-params.blinkOvStiff * b.t - params.blinkOvDamp * b.ftVel) * dt;
    b.t     += b.ftVel * dt;
    const settled = Math.abs(b.ftVel) < 0.005 && Math.abs(b.t) < 0.005;
    if (settled) {
      b.t     = 0;
      b.ftVel = 0;
      b.state = 'open';
      if (Math.random() < params.doubleBlink) {
        b.state = 'closing';
        logEvent('blink ×2');
      }
    }
  }
}

// ─────────────────────────────────────────────
//  UPDATE LOOP
// ─────────────────────────────────────────────

function update(dt) {
  const beh = getBehavior();

  // Update arc animation — phase state machine
  const arc = state.arc;
  if (arc.phase === 'anticipation') {
    arc.antT += dt / arc.antDur;
    if (arc.antT >= 1) {
      // Wind-up complete — transition to main arc from current (wound-up) position
      state.gazeX = arc.antTX;
      state.gazeY = arc.antTY;
      setupArcSegment(state.gazeX, state.gazeY, arc.endX, arc.endY);
      arc.phase = 'main';
    } else {
      // Ease into the wind-up position
      const et = ease.inOutCubic(arc.antT);
      state.gazeX = arc.antOX + (arc.antTX - arc.antOX) * et;
      state.gazeY = arc.antOY + (arc.antTY - arc.antOY) * et;
    }

  } else if (arc.phase === 'main') {
    arc.t += dt / arc.duration;
    if (arc.t >= 1) {
      state.gazeX = arc.endX;
      state.gazeY = arc.endY;
      // Landing squash impulse — spring will decay it back to 0
      if (params.squashStretch > 0) state.squashVel = -params.squashStretch * 2.5;
      if (params.overshootAmt > 0) {
        // Project gaze past target and let spring pull it back
        const dx   = arc.endX - arc.startX;
        const dy   = arc.endY - arc.startY;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        state.gazeX = arc.endX + (dx / dist) * dist * params.overshootAmt;
        state.gazeY = arc.endY + (dy / dist) * dist * params.overshootAmt;
        arc.ftVX   = 0;
        arc.ftVY   = 0;
        arc.ftTimer = 0;
        arc.phase  = 'followthrough';
      } else {
        arc.phase  = 'idle';
        arc.active = false;
        state.behaviorTimer = -(params.pauseMin + Math.random() * (params.pauseMax - params.pauseMin));
      }
    } else {
      const et = arc.easeFn(arc.t);
      state.gazeX = bezierPoint(et, arc.startX, arc.ctrlX, arc.endX);
      state.gazeY = bezierPoint(et, arc.startY, arc.ctrlY, arc.endY);
    }

  } else if (arc.phase === 'followthrough') {
    // Damped spring toward arc.endX/Y
    const dispX = state.gazeX - arc.endX;
    const dispY = state.gazeY - arc.endY;
    arc.ftVX += (-params.overshootStiff * dispX - params.overshootDamp * arc.ftVX) * dt;
    arc.ftVY += (-params.overshootStiff * dispY - params.overshootDamp * arc.ftVY) * dt;
    state.gazeX += arc.ftVX * dt;
    state.gazeY += arc.ftVY * dt;
    arc.ftTimer += dt;

    const settled = arc.ftTimer > 2.0 ||
      (Math.abs(arc.ftVX) < 0.008 && Math.abs(arc.ftVY) < 0.008 &&
       Math.abs(dispX)    < 0.008 && Math.abs(dispY)    < 0.008);
    if (settled) {
      state.gazeX = arc.endX;
      state.gazeY = arc.endY;
      arc.phase   = 'idle';
      arc.active  = false;
      state.behaviorTimer = -(params.pauseMin + Math.random() * (params.pauseMax - params.pauseMin));
    }
  }

  // Behavior timer (negative = waiting, 0 = trigger)
  if (!state.arc.active) {
    state.behaviorTimer += dt;
    if (state.behaviorTimer >= 0) {
      randomSaccade();
    }
    // Micro-saccade drift while holding position
    if (params.microSaccade > 0) {
      state.gazeX += (Math.random() - 0.5) * params.microSaccade * 0.008;
      state.gazeY += (Math.random() - 0.5) * params.microSaccade * 0.008;
      state.gazeX = Math.max(-0.95, Math.min(0.95, state.gazeX));
      state.gazeY = Math.max(-0.95, Math.min(0.95, state.gazeY));
    }
  }

  // Motion cascade — pupils move instantly (gazeX/Y), each body layer
  // lerps toward the gaze target at its own speed, creating natural trail.
  const lerp = (cur, tgt, speed) => cur + (tgt - cur) * Math.min(1, speed * dt);
  state.faceX = lerp(state.faceX, state.gazeX * params.faceTranslateAmt, params.faceTranslateSpeed);
  state.faceY = lerp(state.faceY, state.gazeY * params.faceTranslateAmt, params.faceTranslateSpeed);
  state.headX = lerp(state.headX, state.gazeX * params.headTurnAmt,      params.headTurnSpeed);
  state.headY = lerp(state.headY, state.gazeY * params.headTurnAmt,      params.headTurnSpeed);
  state.bodyX = lerp(state.bodyX, state.gazeX * params.bodyShiftAmt,     params.bodyShiftSpeed);
  state.bodyY = lerp(state.bodyY, state.gazeY * params.bodyShiftAmt,     params.bodyShiftSpeed);

  // 3D rotation (drives Three.js scene via window.three)
  state.head3DYaw   = lerp(state.head3DYaw,   state.gazeX *  params.headRotationMax,        params.head3DSpeed);
  state.head3DPitch = lerp(state.head3DPitch,  state.gazeY *  params.headRotationMax * 0.35, params.head3DSpeed);
  if (!state.gazeTargetActive)
    state.body3DYaw = lerp(state.body3DYaw, state.gazeX * params.bodyRotationMax, params.body3DSpeed);

  // ── Squash & stretch ──
  if (params.squashStretch > 0) {
    const arc = state.arc;
    if (arc.active && arc.phase === 'main') {
      const dx = arc.endX - arc.startX;
      const dy = arc.endY - arc.startY;
      if (dx !== 0 || dy !== 0) state.squashAngle = Math.atan2(dy, dx);
      const target = params.squashStretch * Math.sin(arc.t * Math.PI);
      state.squashAmt += (target - state.squashAmt) * Math.min(1, dt * 16);
      state.squashVel = 0;
    } else {
      // Spring return to 0 — also absorbs the landing squash impulse
      state.squashVel += (-150 * state.squashAmt - 12 * state.squashVel) * dt;
      state.squashAmt += state.squashVel * dt;
      if (Math.abs(state.squashAmt) < 0.0005 && Math.abs(state.squashVel) < 0.001) {
        state.squashAmt = 0; state.squashVel = 0;
      }
    }
  }

  updateBlink(dt);

  // Smooth blink reaction for brow/mouth follow
  state.blinkReact += (state.blink.t - state.blinkReact) * Math.min(1, dt * params.blinkReactDamp);

  // Arc trail — record gaze position and prune old points
  state.now += dt;
  if (params.showTrail) {
    state.trailPoints.push({ x: state.gazeX, y: state.gazeY, t: state.now });
    const cutoff = state.now - params.trailDuration;
    while (state.trailPoints.length > 0 && state.trailPoints[0].t < cutoff) {
      state.trailPoints.shift();
    }
  } else {
    state.trailPoints.length = 0;
  }
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────

function drawTrail(eye) {
  if (!params.showTrail || state.trailPoints.length < 2) return;
  const { cx, cy, rx, ry, rot, sign } = eye;
  const beh = getBehavior();
  const openness  = beh.lidOpenness() * (1 - state.blink.t);
  const displayRy = ry * openness;
  if (displayRy < 0.5) return;

  const travel = params.pupilTravel;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const dur = params.trailDuration;

  // Convert a normalized gaze point to canvas px
  function toPx(pt) {
    const lx = (pt.x + params.pupilBiasX + params.pupilSpacing * sign) * rx * travel;
    const ly = (pt.y + params.pupilBiasY) * displayRy * travel;
    return { x: cx + lx * cos - ly * sin, y: cy + lx * sin + ly * cos };
  }

  const pts = state.trailPoints;
  for (let i = 1; i < pts.length; i++) {
    const p1 = toPx(pts[i - 1]);
    const p2 = toPx(pts[i]);
    // Newer end of segment drives opacity
    const age   = (state.now - pts[i].t) / dur;
    const alpha = Math.max(0, 1 - age) * 0.75;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = hexToRgba(colors.trailColor, alpha);
    ctx.lineWidth   = 2;
    ctx.lineCap     = 'round';
    ctx.stroke();
  }
}

function drawSTI(eye) {
  if (!params.showSTI) return;
  if (!state.arc.active && !params.stiPersist) return;
  const { cx, cy, rx, ry, rot, sign } = eye;
  const beh = getBehavior();
  const openness  = beh.lidOpenness() * (1 - state.blink.t);
  const displayRy = ry * openness;
  if (displayRy < 0.5) return;

  const travel = params.pupilTravel;
  const cos = Math.cos(rot), sin = Math.sin(rot);

  // Convert arc end point to canvas coords (same transform as pupil)
  const lx = (state.arc.endX + params.pupilBiasX + params.pupilSpacing * sign) * rx * travel;
  const ly = (state.arc.endY + params.pupilBiasY) * displayRy * travel;
  const tx = cx + lx * cos - ly * sin;
  const ty = cy + lx * sin + ly * cos;

  const r = params.stiSize;
  // Fade out as we approach target; persist mode holds at full opacity
  const alpha = state.arc.active
    ? Math.max(0, 1 - state.arc.t) * 0.85
    : 0.45;

  ctx.save();

  // Outer circle
  ctx.beginPath();
  ctx.arc(tx, ty, r, 0, Math.PI * 2);
  ctx.strokeStyle = hexToRgba(colors.stiColor, alpha);
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Cross hair
  ctx.beginPath();
  ctx.moveTo(tx - r * 0.55, ty);
  ctx.lineTo(tx + r * 0.55, ty);
  ctx.moveTo(tx, ty - r * 0.55);
  ctx.lineTo(tx, ty + r * 0.55);
  ctx.strokeStyle = hexToRgba(colors.stiColor, alpha * 0.6);
  ctx.lineWidth   = 1;
  ctx.stroke();

  ctx.restore();
}

function drawEye(eye) {
  const { cx, cy, rx, ry, rot, sign } = eye;
  const beh = getBehavior();

  // Blink squishes ry to zero
  const openness  = beh.lidOpenness() * (1 - state.blink.t);
  const displayRy = ry * openness;
  if (displayRy < 0.5) return;

  // Gaze offset in eye-local space, then rotate into canvas space
  const travel = params.pupilTravel;
  const localDx = (state.gazeX + params.pupilBiasX + params.pupilSpacing * sign) * rx * travel;
  const localDy = (state.gazeY + params.pupilBiasY) * displayRy * travel;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const pupilX = cx + localDx * cos - localDy * sin;
  const pupilY = cy + localDx * sin + localDy * cos;

  // Pupil size matches eye aspect ratio
  const pupilRx = rx * params.pupilSize;
  const pupilRy = displayRy * params.pupilSize;

  // Subtle glow behind eye
  const glow = ctx.createRadialGradient(cx, cy, rx * 0.4, cx, cy, rx * 1.8);
  glow.addColorStop(0, hexToRgba(colors.glowColor, 0.07));
  glow.addColorStop(1, hexToRgba(colors.glowColor, 0));
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx * 1.8, displayRy * 1.8, rot, 0, Math.PI * 2);
  ctx.fill();

  // Eye ellipse — clip so pupil stays inside
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, displayRy, rot, 0, Math.PI * 2);
  ctx.fillStyle = colors.eyeColor;
  ctx.fill();
  ctx.clip();

  // Pupil — same aspect ratio, rotated with eye
  if (params.showPupil) {
    ctx.beginPath();
    ctx.ellipse(pupilX, pupilY, pupilRx, pupilRy, rot, 0, Math.PI * 2);
    ctx.fillStyle = colors.pupilColor;
    ctx.fill();
  }

  ctx.restore();
}

function drawLids(eye) {
  const { cx, cy, rx, ry, rot } = eye;
  const beh = getBehavior();
  const openness  = beh.lidOpenness() * (1 - state.blink.t);
  const displayRy = ry * openness;
  if (displayRy < 0.5) return;

  const upperP = beh.upperLid();
  const lowerP = beh.lowerLid();
  if (upperP <= 0 && lowerP <= 0) return;

  const { sign } = eye;
  const curv    = params.lidCurvature;
  const lidRot  = rot + params.lidRotation * Math.PI / 180 * sign;

  ctx.save();
  // Clip to the eye ellipse so lids stay within the eye boundary
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, displayRy, rot, 0, Math.PI * 2);
  ctx.clip();

  ctx.fillStyle = colors.lidColor;

  // Work in lid-local rotated space (may differ from eye rotation)
  ctx.translate(cx, cy);
  ctx.rotate(lidRot);

  if (upperP > 0) {
    // Edge slides from -displayRy (open) down to +displayRy (fully closed)
    const edgeY = displayRy * (2 * upperP - 1);
    const cpY   = edgeY + curv * displayRy; // bezier control point bows the inner edge

    ctx.beginPath();
    ctx.moveTo(-rx, -displayRy - 2);           // top-left corner
    ctx.lineTo( rx, -displayRy - 2);           // top-right corner
    ctx.lineTo( rx,  edgeY);                   // right side of lid edge
    ctx.quadraticCurveTo(0, cpY, -rx, edgeY); // curved inner edge
    ctx.closePath();
    ctx.fill();
  }

  if (lowerP > 0) {
    // Edge slides from +displayRy (open) up to -displayRy (fully closed)
    const edgeY = displayRy * (1 - 2 * lowerP);
    const cpY   = edgeY - curv * displayRy;

    ctx.beginPath();
    ctx.moveTo(-rx,  displayRy + 2);
    ctx.lineTo( rx,  displayRy + 2);
    ctx.lineTo( rx,  edgeY);
    ctx.quadraticCurveTo(0, cpY, -rx, edgeY);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawNose() {
  if (!params.showNose) return;

  const mx      = params.eyeCenterX;
  const my      = params.eyeCenterY + params.noseOffsetY;
  const bridgeH = params.noseBridgeH;
  const halfW   = params.noseWidth / 2;
  const wingH   = params.noseWingH;
  const wingC   = params.noseWingCurve;

  ctx.save();
  ctx.strokeStyle = colors.noseColor;
  ctx.lineWidth   = params.noseThickness;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  // Bridge — vertical line down from top
  ctx.beginPath();
  ctx.moveTo(mx, my);
  ctx.lineTo(mx, my + bridgeH);

  // Left nostril wing — curves out and down from bridge base
  ctx.moveTo(mx, my + bridgeH);
  ctx.quadraticCurveTo(mx - wingC, my + bridgeH + wingH, mx - halfW, my + bridgeH + wingH);

  // Right nostril wing
  ctx.moveTo(mx, my + bridgeH);
  ctx.quadraticCurveTo(mx + wingC, my + bridgeH + wingH, mx + halfW, my + bridgeH + wingH);

  ctx.stroke();
  ctx.restore();
}

// Tapered quadratic bezier — fills a variable-width shape along the curve.
// taper=0: uniform width; taper=1: tapers to a point at both ends.
// taperStart/taperEnd: 0 = full round cap, 1 = sharp point at that end.
// roundCaps: add filled circles at each endpoint (matching the endcap width).
function drawTaperedBezier(p0x, p0y, cpx, cpy, p1x, p1y, thickness, taperStart, taperEnd, color, roundCaps = false) {
  const N  = 32;
  const hw = thickness / 2;
  const top = [], bot = [];

  for (let i = 0; i <= N; i++) {
    const t  = i / N;
    const mt = 1 - t;
    const bx = mt*mt*p0x + 2*mt*t*cpx + t*t*p1x;
    const by = mt*mt*p0y + 2*mt*t*cpy + t*t*p1y;
    let tx = 2*(1-t)*(cpx-p0x) + 2*t*(p1x-cpx);
    let ty = 2*(1-t)*(cpy-p0y) + 2*t*(p1y-cpy);
    const tlen = Math.sqrt(tx*tx + ty*ty) || 1;
    tx /= tlen; ty /= tlen;
    const nx = -ty, ny = tx;
    // Piecewise sin: each half tapers from its end to full width at center
    const wf = t <= 0.5
      ? 1 - taperStart * (1 - Math.sin(t * Math.PI))
      : 1 - taperEnd   * (1 - Math.sin(t * Math.PI));
    const w = hw * wf;
    top.push([bx + nx*w, by + ny*w]);
    bot.push([bx - nx*w, by - ny*w]);
  }

  ctx.save();
  ctx.fillStyle = color;

  // Filled polygon body
  ctx.beginPath();
  ctx.moveTo(top[0][0], top[0][1]);
  for (let i = 1; i <= N; i++) ctx.lineTo(top[i][0], top[i][1]);
  for (let i = N; i >= 0; i--) ctx.lineTo(bot[i][0], bot[i][1]);
  ctx.closePath();
  ctx.fill();

  // Round end caps — circles whose radius matches the width at each tip
  if (roundCaps) {
    const r0 = hw * (1 - taperStart);
    const r1 = hw * (1 - taperEnd);
    if (r0 > 0.5) { ctx.beginPath(); ctx.arc(p0x, p0y, r0, 0, Math.PI * 2); ctx.fill(); }
    if (r1 > 0.5) { ctx.beginPath(); ctx.arc(p1x, p1y, r1, 0, Math.PI * 2); ctx.fill(); }
  }

  ctx.restore();
}

function drawMouth() {
  const beh  = getBehavior();
  const mouthReact = params.blinkMouthReact ? params.blinkMouthAmt * state.blinkReact : 0;
  const mx   = params.eyeCenterX;
  const my   = params.eyeCenterY + params.mouthOffsetY - mouthReact;
  const hw   = params.mouthWidth / 2;
  const curve = params.mouthCurve + beh.mouthCurve();

  const p0x = mx - hw, p0y = my;
  const cpx = mx,      cpy = my + curve;
  const p1x = mx + hw, p1y = my;

  if (params.mouthTaper > 0) {
    drawTaperedBezier(p0x, p0y, cpx, cpy, p1x, p1y, params.mouthThickness, params.mouthTaper, params.mouthTaper, colors.mouthColor, false);
  } else {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(p0x, p0y);
    ctx.quadraticCurveTo(cpx, cpy, p1x, p1y);
    ctx.strokeStyle = colors.mouthColor;
    ctx.lineWidth   = params.mouthThickness;
    ctx.lineCap     = 'round';
    ctx.stroke();
    ctx.restore();
  }
}

function drawBrow(eye) {
  const { cy, sign } = eye;
  const beh = getBehavior();

  const bx        = params.eyeCenterX + (params.browSpacing / 2) * sign;
  const browReact = params.blinkBrowReact ? params.blinkBrowAmt * state.blinkReact : 0;
  const offsetY   = params.browOffsetY + beh.browRaise() - browReact;
  const width     = params.browWidth;
  const thickness = params.browThickness;
  const arch      = params.browArch + beh.browArch();
  const rot       = (params.browRotation + beh.browTilt()) * Math.PI / 180 * sign;

  // Transform local brow points to world space for tapered draw
  const ox = bx, oy = cy - offsetY;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const toWorld = (lx, ly) => [ox + lx*cos - ly*sin, oy + lx*sin + ly*cos];

  const [p0x, p0y] = toWorld(-width / 2, 0);
  const [cpx, cpy] = toWorld(0, -arch);
  const [p1x, p1y] = toWorld(width / 2, 0);

  // p0 = inner (bridge) end for right brow, outer (temple) for left — swap per sign
  const taperStart = sign === 1 ? params.browTaperInner : params.browTaperOuter;
  const taperEnd   = sign === 1 ? params.browTaperOuter : params.browTaperInner;

  if (taperStart > 0 || taperEnd > 0) {
    drawTaperedBezier(p0x, p0y, cpx, cpy, p1x, p1y, thickness, taperStart, taperEnd, colors.browColor, true);
  } else {
    ctx.save();
    ctx.translate(ox, oy);
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.moveTo(-width / 2, 0);
    ctx.quadraticCurveTo(0, -arch, width / 2, 0);
    ctx.strokeStyle = colors.browColor;
    ctx.lineWidth   = thickness;
    ctx.lineCap     = 'round';
    ctx.stroke();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────
//  PLANNING GRID OVERLAY
// ─────────────────────────────────────────────

function drawGrid() {
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const spacing = 50;
  const noGo = 40; // no-go border thickness in px

  ctx.save();

  // ── No-go border zone (semi-transparent red fill) ──
  ctx.fillStyle = 'rgba(255, 70, 70, 0.07)';
  ctx.fillRect(0,         0,          w,     noGo);          // top
  ctx.fillRect(0,         h - noGo,   w,     noGo);          // bottom
  ctx.fillRect(0,         noGo,       noGo,  h - noGo * 2);  // left
  ctx.fillRect(w - noGo,  noGo,       noGo,  h - noGo * 2);  // right

  // ── No-go border dashed outline ──
  ctx.strokeStyle = 'rgba(255, 70, 70, 0.45)';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 5]);
  ctx.strokeRect(noGo + 0.5, noGo + 0.5, w - noGo * 2 - 1, h - noGo * 2 - 1);
  ctx.setLineDash([]);

  // ── Grid lines radiating from canvas center ──
  ctx.strokeStyle = 'rgba(74, 247, 196, 0.10)';
  ctx.lineWidth = 0.5;

  // Vertical grid lines
  for (let x = cx % spacing; x <= w; x += spacing) {
    if (Math.abs(x - cx) < 1) continue; // skip center line (drawn separately)
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
    ctx.stroke();
  }

  // Horizontal grid lines
  for (let y = cy % spacing; y <= h; y += spacing) {
    if (Math.abs(y - cy) < 1) continue;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  // ── Center crosshair ──
  ctx.strokeStyle = 'rgba(74, 247, 196, 0.40)';
  ctx.lineWidth = 1;

  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke(); // vertical
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke(); // horizontal

  // ── Center dot ──
  ctx.fillStyle = 'rgba(74, 247, 196, 0.6)';
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = colors.canvasBg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── Motion cascade (parent transform: face + head + body compound) ──
  ctx.save();
  ctx.translate(
    state.faceX + state.headX + state.bodyX,
    state.faceY + state.headY + state.bodyY
  );

  getEyes().forEach(eye => {
    const ss = state.squashAmt;
    const hasDeform = params.squashStretch > 0 && Math.abs(ss) > 0.001;
    if (hasDeform) {
      ctx.save();
      ctx.translate(eye.cx, eye.cy);
      ctx.rotate(state.squashAngle);
      ctx.scale(1 + ss, 1 / (1 + Math.abs(ss)));
      ctx.rotate(-state.squashAngle);
      ctx.translate(-eye.cx, -eye.cy);
    }
    drawEye(eye);
    if (params.showLids)  drawLids(eye);
    if (hasDeform) ctx.restore();
    if (params.showBrows) drawBrow(eye);
  });
  getEyes().forEach(eye => { drawTrail(eye); drawSTI(eye); });
  drawNose();
  if (params.showMouth) drawMouth();

  ctx.restore();

  if (params.showGrid) drawGrid();

  // ── Behavior label ──
  const beh = getBehavior();
  ctx.font = '700 10px Space Mono';
  ctx.fillStyle = hexToRgba(colors.glowColor, 0.4);
  ctx.letterSpacing = '0.2em';
  ctx.fillText(beh.label, 24, canvas.height - 24);
}


// ─────────────────────────────────────────────
//  MOUSE CONTROL — click to look
// ─────────────────────────────────────────────

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Map relative to canvas center so both eyes look toward the click
  const nx = (mx - canvas.width  / 2) / (canvas.width  / 2 * 0.9);
  const ny = (my - canvas.height / 2) / (canvas.height / 2 * 0.9);
  const tx = Math.max(-0.9, Math.min(0.9, nx));
  const ty = Math.max(-0.7, Math.min(0.7, ny));
  triggerSaccade(tx, ty);
  state.behaviorTimer = -2;
});

// ─────────────────────────────────────────────
//  RAF LOOP
// ─────────────────────────────────────────────

function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (window.three) window.three.preUpdate(); // gaze override before physics
  update(dt);
  draw();
  if (window.three) window.three.render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// ─────────────────────────────────────────────
//  PERSISTENCE
// ─────────────────────────────────────────────

function saveConfig() {
  localStorage.setItem('gazer_config', JSON.stringify({ params: { ...params }, colors: { ...colors } }));
}

function loadConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem('gazer_config'));
    if (!saved) return;
    if (saved.params) Object.assign(params, saved.params);
    if (saved.colors) Object.assign(colors, saved.colors);
  } catch (e) { /* ignore corrupt data */ }
}

function toggleAcc(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggle3D(on) {
  document.querySelector('.stage').classList.toggle('mode-3d', on);
  if (on && window.three) window.three.resize();
}

function makeColorRow(key, label, onChange) {
  const row = document.createElement('div');
  row.className = 'color-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'color';
  inp.value = colors[key];
  const hex = document.createElement('span');
  hex.className = 'hex';
  hex.textContent = colors[key];
  inp.addEventListener('input', () => {
    colors[key] = inp.value;
    hex.textContent = inp.value;
    if (onChange) onChange(inp.value);
    saveConfig();
  });
  row.appendChild(lbl);
  row.appendChild(inp);
  row.appendChild(hex);
  return row;
}

function buildColorPanel() {
  const panel = document.getElementById('panel-colors');
  panel.innerHTML = '';
  const stage = document.querySelector('.stage');
  [
    ['stageBg',    'Stage bg',  v => stage.style.background = v],

function exportConfig() {
  document.getElementById('load-wrap').classList.remove('visible');
  const cfg = { params: { ...params }, colors: { ...colors } };
  document.getElementById('export-out').textContent = JSON.stringify(cfg, null, 2);
  document.getElementById('export-wrap').classList.toggle('visible');
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-out').textContent).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function toggleLoadWrap() {
  document.getElementById('export-wrap').classList.remove('visible');
  document.getElementById('load-wrap').classList.toggle('visible');
}

function applyLoadedConfig() {
  const raw = document.getElementById('load-in').value.trim();
  const err = document.getElementById('load-error');
  err.textContent = '';
  let parsed;
  try { parsed = JSON.parse(raw); }
  catch (e) { err.textContent = 'Invalid JSON: ' + e.message; return; }
  if (typeof parsed !== 'object' || parsed === null) {
    err.textContent = 'Expected a JSON object.'; return;
  }
  if (parsed.params) Object.assign(params, parsed.params);
  if (parsed.colors) Object.assign(colors, parsed.colors);
  syncAllSliders();
  buildColorPanel();
  document.getElementById('load-wrap').classList.remove('visible');
  saveConfig();
  logEvent('config loaded');
}

function setBehavior(name) {
  state.behavior = name;
  state.behaviorTimer = -0.3;
  document.querySelectorAll('.behavior-buttons button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  logEvent(`behavior → ${name}`);
}

function refreshSlider(el) {
  const min = parseFloat(el.min);
  const max = parseFloat(el.max);
  const pct = ((parseFloat(el.value) - min) / (max - min)) * 100;
  el.style.background = `linear-gradient(to right, var(--iris) ${pct}%, #3a3a5c ${pct}%)`;
}

function updateParam(key, value) {
  params[key] = parseFloat(value);
  const el = event.target;
  const dec = parseInt(el.dataset.dec ?? 2);
  const valEl = document.getElementById('val-' + key);
  if (valEl) valEl.textContent = parseFloat(value).toFixed(dec);
  refreshSlider(el);
  saveConfig();
}

function makeCheckbox(key, label) {
  const row = document.createElement('div');
  row.className = 'control-row control-row-checkbox';

  const lbl = document.createElement('label');
  lbl.htmlFor = 'ctrl-' + key;
  lbl.textContent = label;

  const inp = document.createElement('input');
  inp.type    = 'checkbox';
  inp.id      = 'ctrl-' + key;
  inp.checked = !!params[key];
  inp.addEventListener('change', function() {
    params[key] = this.checked;
    saveConfig();
  });

  lbl.prepend(inp);
  row.appendChild(lbl);
  return { row, inp };
}

function makeSlider(key, label, min, max, step, dec = 2) {
  const row = document.createElement('div');
  row.className = 'control-row';

  const lbl = document.createElement('label');
  const valSpan = document.createElement('span');
  valSpan.id = 'val-' + key;
  valSpan.textContent = parseFloat(params[key]).toFixed(dec);
  lbl.appendChild(document.createTextNode(label + ' '));
  lbl.appendChild(valSpan);

  const inp = document.createElement('input');
  inp.type = 'range';
  inp.id = 'ctrl-' + key;
  inp.min = min; inp.max = max; inp.step = step;
  inp.value = params[key];
  inp.dataset.dec = dec;
  inp.addEventListener('input', function() { updateParam(key, this.value); });

  row.appendChild(lbl);
  row.appendChild(inp);
  return { row, inp };
}

      ['saccadeJitter',     'Jitter',             0,    1,   0.01, 2],
      ['gazeRangeX',        'Range X',            0.05, 3,   0.01, 2],
      ['gazeRangeY',        'Range Y',            0.05, 2,   0.01, 2],
      ['pauseMin',          'Pause min',          0.1,  10,  0.1,  1],
      ['pauseMax',          'Pause max',          0.1,  20,  0.1,  1],
      ['microSaccade', 'Micro-drift', 0, 1, 0.01, 2],
    ],
    'panel-motion': [
      ['faceTranslateAmt',  'Face shift',    0,   50,  1,    0],
      ['faceTranslateSpeed','↳ Speed',       0.2,  8,  0.1,  1, true],
      ['headTurnAmt',       'Head turn',      0,   80,  1,    0],
      ['headTurnSpeed',     '↳ Speed',        0.1,  4,  0.1,  1, true],
      ['headRotationMax',   '↳ 3D yaw (°)',   0,   45,   1,     0,    true],
      ['head3DSpeed',       '↳ 3D settle',   0.005,0.3,  0.005, 3,    true],
      ['bodyShiftAmt',      'Body shift',     0,  100,   1,     0],
      ['bodyShiftSpeed',    '↳ Speed',        0.05, 2,   0.05,  2,    true],
      ['bodyRotationMax',   '↳ 3D yaw (°)',   0,   30,   1,     0,    true],
      ['body3DSpeed',       '↳ 3D settle',   0.005,0.2,  0.005, 3,    true],
    ],
    'panel-anim': [
      ['anticipationAmt', 'Saccade anticipation', 0,    0.5,  0.01, 2],
      ['anticipationDur', '↳ Duration',           0.02, 0.3,  0.01, 2, true],
      ['overshootAmt',    'Saccade overshoot',    0,    0.5,  0.01, 2],
      ['overshootDamp',   '↳ Damping',            1,    30,   0.5,  1, true],
      ['overshootStiff',  '↳ Stiffness',          20,   400,  5,    0, true],
      ['squashStretch',   'Squash & stretch',     0,    0.6,  0.01, 2],
      ['blinkAntAmt',     'Blink anticipation',   0,    0.3,  0.01, 2],
      ['blinkAntDur',     '↳ Duration',           0.02, 0.2,  0.01, 2, true],
      ['blinkOvAmt',      'Blink overshoot',      0,    0.3,  0.01, 2],
      ['blinkOvDamp',     '↳ Damping',            1,    30,   0.5,  1, true],
      ['blinkOvStiff',    '↳ Stiffness',          20,   400,  5,    0, true],
      ['blinkBrowReact',  'Brow reacts to blink', 'bool'],
      ['blinkBrowAmt',    '↳ Amount',             0,    30,   0.5,  1, true],
      ['blinkMouthReact', 'Mouth reacts to blink','bool'],
      ['blinkMouthAmt',   '↳ Amount',             0,    30,   0.5,  1, true],
      ['blinkReactDamp',  '↳ Damping',            1,    20,   0.5,  1, true],
    ],
    'panel-trail': [
      ['showGrid',       'Planning grid',  'bool'],
      ['showTrail',      'Arc trail',      'bool'],
      ['trailDuration',  'Trail duration', 0.5,  10,  0.5,  1],
      ['showSTI',        'Target marker',  'bool'],
      ['stiPersist',     'Marker persist', 'bool'],
      ['stiSize',        'Marker size',    3,    30,  1,    0],
    ],
  };

  Object.entries(sections).forEach(([panelId, controls]) => {
    const panel = document.getElementById(panelId);
    if (!panel) return;
    panel.innerHTML = '';
    controls.forEach(args => {
      if (args[2] === 'bool') {
        const { row } = makeCheckbox(args[0], args[1]);
        panel.appendChild(row);
      } else {
        const child = args[6]; // optional child-indent flag
        const { row, inp } = makeSlider(...args.slice(0, 6));
        if (child) row.classList.add('control-row-child');
        panel.appendChild(row);
        refreshSlider(inp);
      }
    });
  });
}

function syncAllSliders() {
  document.querySelectorAll('input[type="range"][id^="ctrl-"]').forEach(el => {
    const key = el.id.slice(5); // strip 'ctrl-'
    if (params[key] !== undefined) {
      el.value = params[key];
      const dec = parseInt(el.dataset.dec ?? 2);
      const valEl = document.getElementById('val-' + key);
      if (valEl) valEl.textContent = parseFloat(params[key]).toFixed(dec);
    }
    refreshSlider(el);
  });
}

const logEl = document.getElementById('log');
const logHistory = [];

function logEvent(msg) {
  const time = new Date().toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  logHistory.unshift({ time, msg });
  if (logHistory.length > 20) logHistory.pop();
  logEl.innerHTML = logHistory.map(e =>
    `<div><span>${e.time}</span>${e.msg}</div>`
  ).join('');
}

loadConfig();
buildControlPanels();
buildColorPanel();
syncAllSliders();
// Expose to Three.js module (const at top-level non-module script doesn't auto-assign to window)
window.state  = state;
window.params = params;
window.colors = colors;
logEvent('system ready');
logEvent('behavior → idle');

// ─────────────────────────────────────────────
//  WEBSOCKET API
//  Connect to a relay server (server.py) that
//  forwards JSON commands from external senders.
// ─────────────────────────────────────────────

let ws = null;

function wsSetStatus(status) {
  const dot = document.getElementById('ws-dot');
  const txt = document.getElementById('ws-status-text');
  if (!dot || !txt) return;
  dot.className = 'ws-dot ' + status;
  txt.textContent = status;
}

function wsConnect() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  const url = document.getElementById('ws-url').value.trim();
  wsSetStatus('connecting');
  logEvent('ws → connecting');
  try {
    ws = new WebSocket(url);
  } catch (e) {
    wsSetStatus('error');
    logEvent('ws error: ' + e.message);
    return;
  }
  ws.addEventListener('open', () => {
    wsSetStatus('connected');
    logEvent('ws → connected');
  });
  ws.addEventListener('close', () => {
    wsSetStatus('disconnected');
    logEvent('ws → disconnected');
    ws = null;
  });
  ws.addEventListener('error', () => {
    wsSetStatus('error');
    logEvent('ws error');
  });
  ws.addEventListener('message', e => {
    try { wsHandleMessage(JSON.parse(e.data)); }
    catch (err) { logEvent('ws parse error'); }
  });
}

function wsDisconnect() {
  if (ws) { ws.close(); ws = null; }
}

function wsHandleMessage(msg) {
  switch (msg.type) {

    case 'behavior':
      if (behaviors[msg.value]) setBehavior(msg.value);
      break;

    case 'param':
      if (params[msg.key] !== undefined) {
        params[msg.key] = parseFloat(msg.value);
        syncAllSliders();
        saveConfig();
        logEvent(`ws param ${msg.key} = ${msg.value}`);
      }
      break;

    case 'params':
      if (typeof msg.data === 'object') {
        Object.assign(params, msg.data);
        syncAllSliders();
        saveConfig();
        logEvent('ws params updated');
      }
      break;

    case 'color':
      if (colors[msg.key] !== undefined) {
        colors[msg.key] = msg.value;
        buildColorPanel();
        saveConfig();
        logEvent(`ws color ${msg.key} = ${msg.value}`);
      }
      break;

    case 'look': {
      const tx = Math.max(-0.9, Math.min(0.9, parseFloat(msg.x) || 0));
      const ty = Math.max(-0.7, Math.min(0.7, parseFloat(msg.y) || 0));
      triggerSaccade(tx, ty);
      state.behaviorTimer = -2;
      break;
    }

    case 'blink':
      if (state.blink.state === 'open') {
        state.blink.state = 'closing';
        state.blink.t = 0;
        state.blink.timer = 0;
        logEvent('ws → blink');
      }
      break;

    case 'config':
      if (typeof msg.data === 'object') {
        if (msg.data.params) Object.assign(params, msg.data.params);
        if (msg.data.colors) Object.assign(colors, msg.data.colors);
        syncAllSliders();
        buildColorPanel();
        saveConfig();
        logEvent('ws config loaded');
      }
      break;

    default:
      logEvent(`ws unknown: ${msg.type}`);
  }
}

</script>


<script type="module">
// ─────────────────────────────────────────────
//  THREE.JS — Mo-style self-balancing robot
// ─────────────────────────────────────────────
import * as THREE from 'three';
import { OrbitControls }      from 'three/addons/controls/OrbitControls.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

const container  = document.getElementById('three-stage');
const faceCanvas = document.getElementById('canvas');

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();

// ── Primary camera (user OrbitControls) ──
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(0, 2.2, 7);

// Future: traveling camera constrained to robot XZ, aimed at body.
// Swap renderer.render(scene, camera) → renderer.render(scene, travelCam)
// when driving mode is active.
// const travelCam = new THREE.PerspectiveCamera(50, 1, 0.1, 100);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.4, 0);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.minDistance    = 2;
controls.maxDistance    = 20;
controls.maxPolarAngle  = Math.PI * 0.88; // prevent going under the floor
controls.update();

// ── Lighting ──
const ambient = new THREE.AmbientLight(0xffffff, 0.80);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 0.65);
sun.position.set(4, 8, 5);
sun.castShadow = true;
sun.shadow.mapSize.width  = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.left    = -5;
sun.shadow.camera.right   =  5;
sun.shadow.camera.top     =  8;
sun.shadow.camera.bottom  = -2;
sun.shadow.camera.near    =  1;
sun.shadow.camera.far     = 25;
sun.shadow.bias           = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8899ff, 0.18);
fill.position.set(-4, 3, -3);
scene.add(fill);

// ── Materials ──
const robotMat  = new THREE.MeshLambertMaterial({ color: 0xe2e2e0 });
const wheelMat  = new THREE.MeshLambertMaterial({ color: 0x202028 });
const floorMat  = new THREE.MeshLambertMaterial({ color: 0x18181f });

const faceTexture      = new THREE.CanvasTexture(faceCanvas);
faceTexture.colorSpace = THREE.SRGBColorSpace;
const screenMat = new THREE.MeshBasicMaterial({ map: faceTexture });

// ── Floor ──
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), floorMat);
floor.rotation.x   = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ── Robot dimensions ──
const C  = 1.20;   // cube size (head and body are both C × C × C)
const WR = 0.46;   // wheel radius
const WT = 0.16;   // wheel tread thickness
const R  = 0.07;   // box corner radius

// ── Robot group (whole robot rotates for body yaw) ──
const robot = new THREE.Group();
scene.add(robot);

// Body cube
const body = new THREE.Mesh(new RoundedBoxGeometry(C, C, C, 3, R), robotMat);
body.position.y = WR + C / 2;
body.castShadow  = true;
robot.add(body);

// Head group (rotates independently for gaze)
const headGroup = new THREE.Group();
headGroup.position.y = WR + C + C / 2;
robot.add(headGroup);

const head = new THREE.Mesh(new RoundedBoxGeometry(C, C, C, 3, R), robotMat);
head.castShadow = true;
headGroup.add(head);

// Face screen — square plane flush on front face
const screen = new THREE.Mesh(new THREE.PlaneGeometry(C * 0.82, C * 0.82), screenMat);
screen.position.z = C / 2 + 0.004;
headGroup.add(screen);

// Wheels — cylinders rotated to lie on their sides
const wheelGeo  = new THREE.CylinderGeometry(WR, WR, WT, 28);
const hubGeo    = new THREE.CylinderGeometry(WR * 0.76, WR * 0.76, WT + 0.005, 20);
const hubCapMat = new THREE.MeshLambertMaterial({ color: 0xc8c8c4 });
[-1, 1].forEach(side => {
  const wheel = new THREE.Mesh(wheelGeo, wheelMat);
  wheel.rotation.z  = Math.PI / 2;
  wheel.position.set(side * (C / 2 + WT / 2 + 0.02), WR, 0);
  wheel.castShadow  = true;
  robot.add(wheel);

  // Hub cap — slightly proud of each face
  const hub = new THREE.Mesh(hubGeo, hubCapMat);
  hub.rotation.z = Math.PI / 2;
  hub.position.set(side * (C / 2 + WT / 2 + 0.02), WR, 0);
  robot.add(hub);
});

// ── Resize ──
function resize() {
  const w = container.clientWidth  || container.offsetWidth  || 600;
  const h = container.clientHeight || container.offsetHeight || 500;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── Gaze target ball ──
const ballMat = new THREE.MeshLambertMaterial({ color: 0xffdd00, emissive: 0x443300 });
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.12, 20, 14), ballMat);
ball.position.set(0, WR + C + C / 2, 2.5); // start at head height, in front
ball.castShadow = true;
scene.add(ball);

// ── Drag interaction ──
const raycaster    = new THREE.Raycaster();
const mouse        = new THREE.Vector2();
const dragPlane    = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const dragPoint    = new THREE.Vector3();
let   isDragging   = false;

function getMouseNDC(e) {
  const rect = container.getBoundingClientRect();
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
}

container.addEventListener('mousedown', e => {
  getMouseNDC(e);
  raycaster.setFromCamera(mouse, camera);
  if (raycaster.intersectObject(ball).length > 0) {
    isDragging = true;
    controls.enabled = false;
    dragPlane.constant = -ball.position.y;
  }
});

container.addEventListener('mousemove', e => {
  if (!isDragging) return;
  getMouseNDC(e);
  raycaster.setFromCamera(mouse, camera);
  if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
    ball.position.x = Math.max(-6, Math.min(6, dragPoint.x));
    ball.position.z = Math.max(-6, Math.min(6, dragPoint.z));
  }
});

container.addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; controls.enabled = true; }
});
container.addEventListener('mouseleave', () => {
  if (isDragging) { isDragging = false; controls.enabled = true; }
});

// ── Gaze from ball position ──
function computeGazeFromBall() {
  const headWorld = new THREE.Vector3();
  headGroup.getWorldPosition(headWorld);
  const dir = new THREE.Vector3().subVectors(ball.position, headWorld).normalize();
  // Robot faces +Z. Right = +X, Up = +Y.
  const maxAngle   = Math.PI / 3; // 60° range
  const horizAngle = Math.atan2(dir.x, dir.z);
  const dist2D     = Math.sqrt(dir.x * dir.x + dir.z * dir.z);
  const vertAngle  = Math.atan2(dir.y, dist2D);
  return {
    gx: Math.max(-1, Math.min(1,  horizAngle / maxAngle)),
    gy: Math.max(-1, Math.min(1, -vertAngle  / maxAngle)),
  };
}

// ── preUpdate — runs before main update() each frame ──
function preUpdate() {
  const s = window.state;
  const p = window.params;
  if (!s || !p) return;

  if (isDragging) {
    s.gazeTargetActive = true;

    // Full world-space horizontal angle from robot (origin) to ball
    const worldAngleDeg = Math.atan2(ball.position.x, ball.position.z) * 180 / Math.PI;
    s.body3DYaw = s.body3DYaw + (worldAngleDeg - s.body3DYaw) * Math.min(1, p.body3DSpeed * 3);

    // Remaining gaze for pupil / head (relative to body facing)
    const { gx, gy } = computeGazeFromBall();
    s.gazeX         = gx;
    s.gazeY         = gy;
    s.arc.active    = false;
    s.arc.phase     = 'idle';
    s.behaviorTimer = -0.5;
  } else {
    s.gazeTargetActive = false;
  }
}

// ── render — called after draw() each frame ──
function render() {
  faceTexture.needsUpdate = true;

  const s = window.state;
  const p = window.params;
  if (s && p) {
    headGroup.rotation.y =  s.head3DYaw   * Math.PI / 180;
    headGroup.rotation.x =  s.head3DPitch * Math.PI / 180;
    robot.rotation.y     =  s.body3DYaw   * Math.PI / 180;
    applyColors();
    renderer.setClearColor(new THREE.Color(window.colors?.stageBg ?? '#0a0a0f'));
  }

  controls.update();
  renderer.render(scene, camera);
}

function applyColors() {
  const c = window.colors;
  if (!c) return;
  floorMat.color.set(c.floorColor);
  robotMat.color.set(c.robotColor);
  wheelMat.color.set(c.wheelColor);
}

window.three = { preUpdate, render, resize, applyColors };
</script>
